name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish win-x64 single EXE
        shell: pwsh
        run: .\build\publish-win-x64.ps1

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-Addon-Ersteller-win-x64
          path: release/MC Addon Ersteller.exe
